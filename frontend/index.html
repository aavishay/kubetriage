<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>KubeTriage</title>
  <!-- We keep the CDN for Tailwind for simplicity in this setup -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          keyframes: {
            'loading-bar': {
              '0%': { transform: 'translateX(-50%)' },
              '100%': { transform: 'translateX(0)' },
            }
          },
          animation: {
            'loading-bar': 'loading-bar 1s linear infinite',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafafa;
      background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Dark mode background override via JS class usually, but standard media query for now or rely on .dark body if tailwind handles it */
    .dark body {
      background-color: #09090b;
      background-image: radial-gradient(#27272a 1px, transparent 1px);
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Premium Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #e4e4e7;
      border-radius: 9999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a1a1aa;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #000000;
      border: 1px solid #18181b;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #09090b;
    }

    /* Glassmorphism Utility */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .dark .glass {
      background: rgba(24, 24, 27, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
    "react-syntax-highlighter": "https://aistudiocdn.com/react-syntax-highlighter@^16.1.0",
    "react-syntax-highlighter/": "https://aistudiocdn.com/react-syntax-highlighter@^16.1.0/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <!-- Updated path to point to index.tsx -->
  <script type="module" src="/index.tsx"></script>
</body>

</html>
