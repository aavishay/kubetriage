{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubetriage.serviceAccountName" . }}
  labels:
    {{- include "kubetriage.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

---

{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubetriage.fullname" . }}-reader
  labels:
    {{- include "kubetriage.labels" . | nindent 4 }}
rules:
  # Workload resources
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes", "namespaces", "events"]
    verbs: ["get", "list", "watch"]
  # Metrics resources (future proofing)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubetriage.fullname" . }}-reader-binding
  labels:
    {{- include "kubetriage.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubetriage.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kubetriage.fullname" . }}-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
