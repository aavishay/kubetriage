project_name: kubetriage

before:
  hooks:
    - make build-frontend

builds:
  - id: kubetriage
    dir: .
    main: ./cmd/server
    binary: kubetriage
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X main.version={{.Version}} -s -w

archives:
  - id: kubetriage
    builds:
      - kubetriage
    format: tar.gz
    files:
      - LICENSE
      - README.md

brews:
  - id: kubetriage
    name: kubetriage
    repository:
      owner: aavishay
      name: homebrew-kubetriage
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    folder: Formula
    homepage: https://github.com/aavishay/kubetriage
    description: "KubeTriage - Autonomous SRE Guard for Kubernetes"
    license: "MIT"
    install: |
      bin.install "kubetriage"
    test: |
      system "#{bin}/kubetriage", "--help"

release:
  github:
    owner: aavishay
    name: kubetriage
  draft: false
