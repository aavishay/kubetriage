version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: kubetriage-backend
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - DATABASE_URL=host=postgres user=kubetriage password=kubetriage dbname=kubetriage port=5432 sslmode=disable
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost:8081
      - REDIS_ADDR=kubetriage-redis:6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=http://localhost:8081/api/auth/google/callback

  kubetriage-redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    container_name: kubetriage-postgres
    environment:
      POSTGRES_USER: kubetriage
      POSTGRES_PASSWORD: kubetriage
      POSTGRES_DB: kubetriage
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: kubetriage-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: kubetriage-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: always

networks:
  default:
    driver: bridge

volumes:
  pgdata:
  redis_data:
