services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubetriage-app
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-kubetriage.db}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - JWT_SECRET=${JWT_SECRET:-change-me-please}
      - MOCK_OIDC=${MOCK_OIDC:-true}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:latest}
    volumes:
      - ./kubetriage.db:/app/kubetriage.db
      - ${HOME}/.kube/config:/home/appuser/.kube/config:ro
      - ${HOME}/.minikube:${HOME}/.minikube:ro
      - ${HOME}/.aws:/home/appuser/.aws
      - ${HOME}/.config/gcloud:/home/appuser/.config/gcloud
      - ${HOME}/.azure:/home/appuser/.azure
    depends_on:
      - redis
      - prometheus
    restart: unless-stopped

  redis:
    image: bitnami/redis:latest
    container_name: kubetriage-redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6381:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: kubetriage-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"

  ollama:
    image: ollama/ollama:latest
    container_name: kubetriage-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  redis_data:
  ollama_models:
