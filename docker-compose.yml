version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: kubetriage-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - DATABASE_URL=host=postgres user=kubetriage password=kubetriage dbname=kubetriage port=5432 sslmode=disable
      # IMPORTANT: If running in Docker Desktop, host.docker.internal can map to host ~/.kube/config if mounted properly, 
      # but for now we assume KubeConfig is handled or we rely on In-Cluster config if deployed to K8s.
      # For local testing, we might need to mount kubeconfig.
    volumes:
      # Mount local kubeconfig for development convenience
      - ~/.kube:/home/appuser/.kube:ro
    depends_on:
      - jaeger
      - postgres
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: kubetriage-postgres
    environment:
      POSTGRES_USER: kubetriage
      POSTGRES_PASSWORD: kubetriage
      POSTGRES_DB: kubetriage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: kubetriage-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: kubetriage-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: always

networks:
  default:
    driver: bridge

volumes:
  pgdata:
